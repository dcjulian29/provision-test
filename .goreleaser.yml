---
version: 2
before:
  hooks:
    - go mod tidy
    - go mod verify
    - go vet
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64

archives:
  - files:
      - LICENSE
    builds_info:
      group: root
      owner: root
      mode: 0755
    name_template: "dcjulian29.apps.provision-test_{{ .Version }}_{{ .Os }}"
    format_overrides:
      - formats: [ "zip" ]
        goos: windows

nfpms:
  - package_name: dcjulian29.apps.provision-test
    homepage: https://github.com/dcjulian29/provision-test/
    maintainer: Julian Easterling <julian@julianscorner.com>
    license: Apache 2.0
    description: |-
      provision-test is a wrapper to test ansible playbooks inside a vagrant environment.
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin

chocolateys:
  - name: dcjulian29.apps.provision-test
    authors: Julian Easterling <julian@julianscorner.com>
    project_url: https://github.com/dcjulian29/provision-test/
    copyright: 2023 Julian Easterling julian@julianscorner.com
    license_url: https://github.com/dcjulian29/provision-test/blob/main/LICENSE
    require_license_acceptance: false
    bug_tracker_url: https://github.com/dcjulian29/provision-test/issues
    description: |
      provision-test is a wrapper to test ansible playbooks inside a vagrant environment.
    api_key: "{{ .Env.CHOCO_API_KEY}}"
    source_repo: "https://www.myget.org/F/dcjulian29-chocolatey/"
    skip_publish: false
checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^admin:'
      - '^docs:'
      - '^test:'
